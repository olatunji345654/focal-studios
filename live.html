<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Videography | Focal Studios</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('1000205182.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 20px;
        }
        .content-box {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(10, 10, 10, 0.85);
            border-top: 4px solid #D4AF37;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { text-align: center; color: #D4AF37; }
        .service-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #333; }
        .price-tag { color: #D4AF37; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>Livestreaming</h1>
        <div class="service-item"><span>Conference Livestream</span><span class="price-tag">₦150,000/day</span></div>
        <div class="service-item"><span>Lecture Livestream</span><span class="price-tag">₦150,000/day</span></div>
        <div class="service-item"><span>Standard Livestream<br>Phone Livestream</span><span class="price-tag">₦90,000/day</span></div>
        <div class="service-item"><span>Standard Livestream<br>One Camera Livestream</span><span class="price-tag">₦120,000/day</span></div>
        <div class="service-item"><span>Other Event</span><span class="price-tag">negotiable</span></div>
        <p style="text-align:center;"><a href="index.html" style="color: #D4AF37; text-decoration: none;">Return Home</a></p>
    </div>

    <div id="contact" style="max-width: 600px; margin: 60px auto; padding: 20px; background: rgba(10, 10, 10, 0.95); border-radius: 15px; border: 1px solid #D4AF37; font-family: sans-serif;">
    <h2 style="color: #D4AF37; text-align: center; letter-spacing: 2px;">SECURE YOUR DATE</h2>
    
    <div style="margin-top: 20px;">
        <input type="text" id="custName" placeholder="Your Full Name" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;">
        
        <select id="serviceType" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;">
            <option value="Photography">Photography</option>
            <option value="Videography">Videography</option>
            <option value="Gadget Rentals">Gadget Rentals</option>
            <option value="Drone Piloting">Drone Piloting</option>
            <option value="Consultation">Consultation</option>
            <option value="Livestreaming">Livestreaming</option>
            <option value="Editing">Editing</option>
            <option value="Website Development">Website Development</option>
        </select>
        
        <textarea id="custMessage" rows="4" placeholder="Event date and location..." style="width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;"></textarea>
        
        <button type="button" onclick="
            var name = document.getElementById('custName').value;
            var service = document.getElementById('serviceType').value;
            var msg = document.getElementById('custMessage').value;
            var phone = '2348025052318';
            var text = 'Hello Focal Studios!%0A%0A*Name:* ' + name + '%0A*Service:* ' + service + '%0A*Details:* ' + msg;
            window.open('https://wa.me/' + phone + '?text=' + text, '_blank');
        " style="width: 100%; padding: 15px; background: #25D366; color: white; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase;">
            Send to WhatsApp 
        </button>
    </div>
</div>
</body>
</html>
